version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: otus_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: otus

  redis:
    image: redis:7
    container_name: otus_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17
    container_name: testing
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: otus
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: generate82
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: