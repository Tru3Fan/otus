name: CI

on:
  push:
    branches: [ main, project ]
  pull_request:
    branches: [ main ]


jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_DSN: "postgres://test:test@localhost:5432/testdb?sslmode=disable"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: lint
        run: go vet ./...

      - name: Create data directory for tests
        run: mkdir -p data && touch data/tasks.csv data/users.csv


      - name: Run tests
        run: go test -race -count=100 ./...

      - name: Build
        run: go build -o server ./cmd/main.go
